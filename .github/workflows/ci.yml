name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test (GHC 9.12.2)
    runs-on: ubuntu-latest
    container: haskell:9.12.2

    steps:
      - uses: actions/checkout@v4

      - name: Show cabal paths
        run: cabal path

      - name: Cache cabal store
        uses: actions/cache@v4
        with:
          path: |
            /github/home/.local/state/cabal
            /github/home/.cache/cabal/packages
          key: ${{ runner.os }}-ghc-9.12.2-store-${{ hashFiles('cabal.project.freeze', 'ish.cabal', 'cabal.project') }}
          restore-keys: |
            ${{ runner.os }}-ghc-9.12.2-store-

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: dist-newstyle
          key: ${{ runner.os }}-ghc-9.12.2-dist-${{ hashFiles('cabal.project.freeze', 'ish.cabal', 'src/**/*.hs', 'test/**/*.hs') }}

      - name: Update cabal index
        run: cabal update

      - name: Build
        run: cabal build all --enable-optimization=2

      - name: Test
        run: cabal test --test-show-details=direct
