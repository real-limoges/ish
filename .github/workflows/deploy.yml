name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  deploy:
    needs: test
    uses: real-limoges/real-complex/.github/workflows/deploy-service.yml@main
    with:
      service_name: ish
      service_account: ish-runner@realcomplex-prod.iam.gserviceaccount.com
    permissions:
      contents: read
      id-token: write
